<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Abstract Art Gallery</title>
      <link rel="style" herf="Abstract Art.html"> 
    <style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#b390ac;
}

header{
    background:#77556e;
    color:rgb(214, 221, 223);
    text-align:center;
    padding:20px;
}

nav{
    background:#6ab66f;
    text-align:center;
    padding:10px;
}

nav a{
    color:rgb(178, 98, 98);
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}

nav a:hover{
    color:#ffeb3b;
}

section{
    padding:40px 20px;
    max-width:1200px;
    margin:auto;
}

.gallery{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:25px;
}

.art{
    background:rgb(181, 114, 172);
    width:220px;
    border-radius:10px;
    box-shadow:0 6px 15px rgba(0,0,0,0.2);
    text-align:center;
    overflow:hidden;
}

.art img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.art h3{
    margin:10px 0 5px;
}

.price{
    color:#d2ccd2;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    background:#443645;
    color:rgb(194, 133, 191);
    border:none;
    padding:8px 15px;
    margin-bottom:15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#b7deb9;
}

footer{
    background:#986d92;
    color:rgb(67, 48, 70);
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<header>
<h1>Abstract Art Collection</h1>
<p></p>
</header>



<section>
<div class="gallery">

<div class="art">
<img src="Abs.1.jpg" alt="Abstract art 1">
<h3>Forest Path</h3>
<p class="price">₹2,000</p>
<button>Buy Now</button>
</div>

<div class="art">
<img src="Abs 2.jpg" alt="Abstract art2">
<h3>girl</h3>
<p class="price">₹4,200</p>
<button>Buy Now</button>
</div>

<div class="art">
<img src="Abs 3.jpg" alt="Abstract art 3">
<h3>Autumn Trees</h3>
<p class="price">₹6,000</p>
<button>Buy Now</button>
</div>

<div class="art">
<img src="Abs4.jpg" alt="Abstract art 4">
<h3>colors</h3>
<p class="price">₹2,500</p>
<button>Buy Now</button>
</div>

<div class="art">
<img src="Abs5.jpg" alt="Abstract art 5">
<h3>blue</h3>
<p class="price">₹1,100</p>
<button>Buy Now</button>
</div>

<div class="art">
<img src="Abs6.jpg" alt="Abstract art 5">
<h3>mix blue</h3>
<p class="price">₹1,200</p>
<button>Buy Now</button>
</div>

<div class="art">
<img src="Abs7.jpg" alt="Abstract art 5">
<h3>park</h3>
<p class="price">₹2,500</p>
<button>Buy Now</button>
</div>

</div>
</section>

</html>
